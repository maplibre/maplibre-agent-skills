- description: base_path vs public_urls
  vars:
    prompt: >
      I configured Martin using public_urls, it ran without 
      any error but TileJSON URLs are still showing the wrong path.
      What went wrong?
  assert:
    - type: icontains
      value: base_path
    - type: llm-rubric
      value: >
        Must state that public_urls is not a valid Martin config key.
        Must recommend base_path instead.
        Must mention that if base_path is not set, Martin respects
        the X-Rewrite-URL header.
        A response that says public_urls is valid is WRONG.

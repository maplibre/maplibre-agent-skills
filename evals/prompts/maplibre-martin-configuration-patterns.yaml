# Evals for the maplibre-martin-configuration-patterns skill.
#
# Scope: five core configuration gotchas only —
#   1. YAML-only config format
#   2. --config vs CLI mutual exclusion
#   3. DATABASE_URL silent override
#   4. TileJSON internal host behind reverse proxy
#   5. No built-in authentication
#
# Run locally (Cerebras — set CEREBRAS_API_KEY):
#   npx promptfoo@latest eval \
#     --config evals/prompts/maplibre-martin-configuration-patterns.yaml \
#     --no-cache -j 1

description: Evals for the maplibre-martin-configuration-patterns skill

prompts:
  - file://lib/skill-prompt.mjs

providers:
  - id: cerebras:qwen-3-235b-a22b-instruct-2507
    label: cerebras-qwen

evaluateOptions:
  delay: 500

defaultTest:
  vars:
    skillFile: skills/maplibre-martin-configuration-patterns/SKILL.md
  options:
    provider: cerebras:qwen-3-235b-a22b-instruct-2507

tests:
  - description: explicit — Martin config file format
    vars:
      prompt: >
        I tried to configure Martin using a TOML file but it is not working.
        What config format does Martin support?
    assert:
      - type: icontains
        value: "YAML"
      - type: llm-rubric
        value: >
          Response must state that Martin only supports YAML config files.
          Must explicitly state that TOML and JSON are not supported.
          Must not suggest that TOML is a valid format.

  - description: implicit — DATABASE_URL overrides config
    vars:
      prompt: >
        I have a config file that specifies my database connection
        but Martin keeps connecting to a different database. What
        could cause this?
    assert:
      - type: icontains
        value: "DATABASE_URL"
      - type: llm-rubric
        value: >
          Response must identify DATABASE_URL environment variable as the
          likely cause. Must explain that DATABASE_URL silently overrides
          the database connection in the config file. Must suggest checking
          the environment variable with echo $DATABASE_URL.

  - description: anti-pattern — mixing --config with CLI connection string
    vars:
      prompt: >
        I am running Martin like this:
        martin --config my-config.yaml postgres://user:pass@localhost/mydb
        but my connection string seems to be ignored. Why?
    assert:
      - type: icontains
        value: "mutually exclusive"
      - type: llm-rubric
        value: >
          Response must explain that --config and CLI connection parameters
          are mutually exclusive in Martin. Must state that when --config is
          set, the CLI connection string is silently ignored with no warning.
          Must advise putting connection info inside the config file instead.

  - description: implicit — TileJSON shows internal host behind proxy
    vars:
      prompt: >
        I deployed Martin behind Nginx and my map client cannot load tiles.
        The TileJSON response has localhost in the tiles URL instead of my
        domain. How do I fix this?
    assert:
      - type: icontains
        value: "public_urls"
      - type: llm-rubric
        value: >
          Response must identify that Martin reflects the internal host in
          TileJSON tiles field by default when behind a reverse proxy.
          Must recommend setting public_urls in the Martin config file as
          the fix. Must mention public_urls explicitly — not just proxy
          header forwarding alone.

  - description: anti-pattern — expecting built-in auth in Martin
    vars:
      prompt: >
        I want to add JWT authentication to my Martin tile server.
        Where do I configure the auth: block in Martin's config file?
    assert:
      - type: llm-rubric
        value: >
          Response must clearly state that Martin has no built-in
          authentication and there is no auth: key in Martin's config.
          Must explain this is by design. Must redirect the user to
          implement authentication at a reverse proxy or CDN level.
          Must not suggest any Martin config key for authentication.

  - description: negative — unrelated MapLibre GL JS question
    vars:
      prompt: >
        How do I add a GeoJSON layer to a MapLibre GL JS map?
    assert:
      - type: llm-rubric
        value: >
          Answers the question correctly about adding GeoJSON to MapLibre GL JS
          without bringing up Martin configuration as if it were relevant
          to this question.

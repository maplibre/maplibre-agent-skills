description: Evals for the martin-configuration-patterns skill

prompts:
  - file://lib/skill-prompt.mjs

providers:
  - id: cerebras:qwen-3-235b-a22b-instruct-2507
    label: cerebras-qwen

evaluateOptions:
  delay: 500

defaultTest:
  vars:
    skillFile: skills/maplibre-martin-configuration-patterns/SKILL.md
  options:
    provider: cerebras:qwen-3-235b-a22b-instruct-2507

tests:
  - description: explicit — Martin config format
    vars:
      prompt: 'What file format does Martin use for configuration?'
    assert:
      - type: llm-rubric
        value: >
          Response must state that Martin uses YAML format only,
          and must clarify that TOML and JSON are not supported.

  - description: implicit — config flag conflict
    vars:
      prompt: >
        I am passing a connection string to Martin but it seems
        to be ignoring it, what could be wrong?
    assert:
      - type: llm-rubric
        value: >
          Response must explain that --config and CLI connection
          parameters are mutually exclusive — if --config is set,
          CLI connection strings are ignored with no warning.

  - description: anti-pattern — wrong config format
    vars:
      prompt: >
        I am configuring Martin using a TOML file,
        here is my config.toml...
    assert:
      - type: llm-rubric
        value: >
          Response must warn that Martin does not support TOML
          or JSON config formats. Must state that YAML is the
          only supported format and the file must use .yaml
          or .yml extension.

  - description: negative — out-of-scope question
    vars:
      prompt: 'How do I install MapLibre GL JS locally?'
    assert:
      - type: llm-rubric
        value: >
          Answers the question correctly without bringing up
          Martin configuration as if it were relevant to
          this question.
description: Evals for the maplibre-martin-configuration-patterns skill

prompts:
  - file://lib/skill-prompt.mjs

providers:
  - id: cerebras:qwen-3-235b-a22b-instruct-2507
    label: cerebras-qwen

evaluateOptions:
  delay: 500

defaultTest:
  vars:
    skillFile: skills/maplibre-martin-configuration-patterns/SKILL.md
  options:
    provider: cerebras:qwen-3-235b-a22b-instruct-2507

tests:
  - description: explicit — public_urls config key name
    vars:
      prompt: >
        What is the exact Martin config key I need to set so that
        TileJSON responses show my public domain instead of localhost
        when running behind a reverse proxy?
    assert:
      - type: icontains
        value: "public_urls"
      - type: llm-rubric
        value: >
          Must name the exact config key public_urls. Must not only
          suggest proxy header forwarding as the solution.

  - description: implicit — DATABASE_URL on Railway
    vars:
      prompt: >
        I deployed Martin on Railway with a config file setting my
        database connection, but it keeps connecting to a different
        database. I have not changed anything. What should I check first?
    assert:
      - type: icontains
        value: "DATABASE_URL"
      - type: llm-rubric
        value: >
          Must identify DATABASE_URL as the cause. Must explain that
          Railway automatically injects DATABASE_URL which silently
          overrides the config file connection string.

  - description: anti-pattern — --config with connection string
    vars:
      prompt: >
        martin --config config.yaml postgres://user:pass@localhost/mydb
        My connection string is being ignored. Is this a bug?
    assert:
      - type: icontains
        value: "mutually exclusive"
      - type: llm-rubric
        value: >
          Must state this is not a bug — --config and CLI connection
          strings are mutually exclusive by design. Must state there
          is no runtime warning when this happens.

  - description: implicit — TOML silently ignored
    vars:
      prompt: >
        I created a config.toml for Martin but it seems to have no
        effect. Martin starts but ignores all my settings. Why?
    assert:
      - type: icontains
        value: "YAML"
      - type: llm-rubric
        value: >
          Must explain Martin silently ignores non-YAML config files.
          Must state YAML is the only supported format. Must instruct
          the user to rename the file to .yaml and rewrite it as YAML.

  - description: anti-pattern — auth key in Martin config
    vars:
      prompt: >
        Where exactly in config.yaml do I add the auth: block to
        enable API key authentication in Martin?
    assert:
      - type: llm-rubric
        value: >
          Must state there is no auth: key in Martin config — it does
          not exist. Must say Martin has no built-in authentication
          by design. Must redirect to proxy or CDN for auth.

  - description: negative — MapLibre GL JS unrelated
    vars:
      prompt: >
        How do I filter features by property value in MapLibre GL JS?
    assert:
      - type: llm-rubric
        value: >
          Answers the MapLibre GL JS filter question correctly.
          Does not bring up Martin configuration or tile server
          setup as relevant to this question.
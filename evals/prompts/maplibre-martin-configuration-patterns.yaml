
# Evals for the maplibre-martin-configuration-patterns skill.
#
# Scope: five core configuration gotchas only —
#   1. YAML-only config format (silent ignore behavior)
#   2. --config vs CLI mutual exclusion (no warning)
#   3. DATABASE_URL silent override (PaaS auto-inject)
#   4. TileJSON internal host — exact fix: public_urls key
#   5. No built-in authentication — by design
#
# Baseline check (must fail without skill):
#   npm run eval -- \
#     --config evals/prompts/maplibre-martin-configuration-patterns.yaml \
#     --var injectSkill=false \
#     --no-cache -j 1

description: Evals for the maplibre-martin-configuration-patterns skill

prompts:
  - file://lib/skill-prompt.mjs

providers:
  - id: cerebras:qwen-3-235b-a22b-instruct-2507
    label: cerebras-qwen

evaluateOptions:
  delay: 500

defaultTest:
  vars:
    skillFile: skills/maplibre-martin-configuration-patterns/SKILL.md
  options:
    provider: cerebras:qwen-3-235b-a22b-instruct-2507

tests:
  - description: explicit — Martin silently ignores non-YAML config
    vars:
      prompt: >
        I started Martin with --config config.toml and it ran without
        any error or warning, but none of my settings are applied.
        Why did Martin not tell me there was a problem with my config file?
    assert:
      - type: icontains
        value: "YAML"
      - type: llm-rubric
        value: >
          Must explain that Martin only supports YAML config files and
          silently ignores config files in other formats like TOML or JSON
          without producing any error or warning. Must not say Martin
          returns an error or falls back to defaults with a message.

  - description: implicit — CLI connection string silently ignored with --config
    vars:
      prompt: >
        Martin is connecting to the wrong database. I am passing both
        --config and a postgres:// connection string on the command line.
        There are no errors in the logs. Which one does Martin use?
    assert:
      - type: icontains
        value: "mutually exclusive"
      - type: llm-rubric
        value: >
          Must state that --config and CLI connection parameters are
          mutually exclusive. Must explain that when --config is set,
          the CLI connection string is silently ignored with no warning
          in the logs. Must not say the CLI string takes precedence or
          that Martin merges both.

  - description: implicit — PaaS platform auto-injects DATABASE_URL
    vars:
      prompt: >
        I deployed Martin to Render with a YAML config file that sets
        my database connection. Martin is connecting to a completely
        different database than what is in my config file. I did not
        set any environment variables myself.
    assert:
      - type: icontains
        value: "DATABASE_URL"
      - type: llm-rubric
        value: >
          Must identify that Render automatically injects DATABASE_URL
          as an environment variable, and that this silently overrides
          the database connection defined in Martin's config file.
          Must suggest running echo $DATABASE_URL to verify.
          Must not say the user needs to check their config file syntax.

  - description: anti-pattern — proxy headers alone not sufficient for TileJSON
    vars:
      prompt: >
        I configured Nginx to pass X-Forwarded-Host and X-Forwarded-Proto
        headers to Martin, but the TileJSON tiles field still shows
        localhost. What else do I need to do?
    assert:
      - type: icontains
        value: "public_urls"
      - type: llm-rubric
        value: >
          Must recommend setting the public_urls key in Martin's YAML
          config file as the reliable fix. Must name public_urls
          explicitly — a response that only mentions proxy headers
          without mentioning public_urls is incorrect for this question.

  - description: anti-pattern — no auth config key exists in Martin
    vars:
      prompt: >
        I am looking through Martin's config.yaml documentation but I
        cannot find the auth: section. Does it use a different key name
        like security: or jwt: to configure authentication?
    assert:
      - type: llm-rubric
        value: >
          Must clearly state that no authentication config key exists
          in Martin — not auth:, not security:, not jwt:, not api_key:.
          Must explain Martin has no built-in authentication by design.
          Must not suggest any Martin config key for authentication.
          Must redirect to proxy-level or CDN-level authentication.

  - description: negative — PMTiles hosting question unrelated to Martin config
    vars:
      prompt: >
        I want to host PMTiles files on Cloudflare R2 without a tile server.
        How do I serve them directly to MapLibre GL JS?
    assert:
      - type: llm-rubric
        value: >
          Answers the question about hosting PMTiles on Cloudflare R2
          and serving directly to MapLibre GL JS. Must not recommend
          Martin as the solution or bring up Martin configuration
          gotchas as relevant to this serverless PMTiles question.
```
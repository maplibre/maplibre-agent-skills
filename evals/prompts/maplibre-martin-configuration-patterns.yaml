description: Evals for the maplibre-martin-configuration-patterns skill

prompts:
  - file://lib/skill-prompt.mjs

providers:
  - id: cerebras:qwen-3-235b-a22b-instruct-2507
    label: cerebras-qwen

evaluateOptions:
  delay: 500

defaultTest:
  vars:
    skillFile: skills/maplibre-martin-configuration-patterns/SKILL.md
  options:
    provider: cerebras:qwen-3-235b-a22b-instruct-2507

tests:
  - description: TOML config silently ignored by Martin
    vars:
     prompt: >
       I created a config file named config.toml with my database settings.
       I ran martin --config config.toml but Martin is not serving any of my configured sources. What is wrong?
    assert:
      - type: icontains
        value: YAML
      - type: llm-rubric
        value: >
          Must state that Martin only supports YAML config files.
          Must not say that TOML is a valid config format for Martin.
          A response saying TOML works or Martin returns an error for TOML is WRONG.

  - description: base_path vs public_urls
    vars:
      prompt: >
        I configured Martin using public_urls but TileJSON URLs are
        still showing the wrong path. What went wrong?
    assert:
      - type: icontains
        value: base_path
      - type: llm-rubric
        value: >
          Must state that public_urls is not a valid Martin config key.
          Must recommend base_path instead.
          Must mention that if base_path is not set, Martin respects
          the X-Rewrite-URL header.
          Must not suggest public_urls are valid.

  - description: mutually exclusive --config and CLI connection string
    vars:
      prompt: >
        I want to run Martin. Is it okay to use both a CLI connection
        string and --config together?
    assert:
      - type: icontains
        value: error
      - type: llm-rubric
        value: >
          Must state that --config and CLI connection string are mutually
          exclusive in Martin.
          Must state that Martin prints an explicit error message when
          both are used together.
          Must not recommend using both --config and a CLI connection string.
          A response saying both can be used together is WRONG.

  - description: DATABASE_URL silently overrides config with no warning
    vars:
      prompt: >
        I set a database connection in my Martin config file but also have
        DATABASE_URL set in my environment. Which one does Martin use and
        does it tell me which one it picked?
    assert:
      - type: llm-rubric
        value: >
          Must state that DATABASE_URL takes precedence over the config file.
          Must state that Martin does NOT log any message or warning telling
          the user which connection string it picked.
          A response saying Martin logs which connection it chose is WRONG.
          A response saying the config file takes precedence is WRONG.

  

  - description: proxy headers alone not sufficient for TileJSON
    vars:
      prompt: >
        I configured Nginx to pass X-Forwarded-Host and X-Forwarded-Proto
        headers to Martin, but the TileJSON tiles field still shows
        localhost. What else do I need to do?
    assert:
      - type: icontains
        value: base_path
      - type: llm-rubric
        value: >
          Must recommend setting base_path in Martin's YAML config file
          as the reliable fix. Must name base_path explicitly.
          May mention that X-Rewrite-URL header is respected if base_path
          is not set, but base_path is the explicit recommended solution.
          A response that recommends public_urls is WRONG.

  - description: Martin has no built-in API key auth config key
    vars:
      prompt: >
        I need to add API key auth to Martin. What config key should I use?
    assert:
      - type: icontains
        value: proxy
      - type: llm-rubric
        value: >
          Must state that Martin has no built-in API key auth config key.
          Must recommend handling authentication at the proxy level (e.g. Nginx).
          A response that suggests a Martin config key for auth is WRONG.

  - description: CORS default allows all origins
    vars:
      prompt: >
        I just started Martin without any CORS configuration.
        Will browsers be able to make cross-origin requests to my tile server?
    assert:
      - type: llm-rubric
        value: >
          Must state that Martin defaults to cors: true which allows all origins.
          A response saying CORS is disabled by default or browsers will be
          blocked is WRONG.

  - description: CORS restrict to specific origin
    vars:
      prompt: >
        I want only https://example.org to access my Martin tile server.
        How do I configure this?
    assert:
      - type: icontains
        value: origin
      - type: llm-rubric
        value: >
          Must show the cors.origin config key with the specific domain.
          Must not suggest cors: true or cors: false as the solution.
          A response that ignores Martin's native CORS config is WRONG.

  - description: CORS disable entirely
    vars:
      prompt: >
        I handle CORS at my Nginx proxy. How do I stop Martin from
        sending any CORS headers at all?
    assert:
      - type: icontains
        value: "false"
      - type: llm-rubric
        value: >
          Must recommend setting cors: false in Martin config.
          A response that only mentions proxy config without cors: false is WRONG.

  - description: negative — PMTiles hosting question unrelated to Martin config
    vars:
      prompt: >
        I want to host PMTiles files on Cloudflare R2 without a tile server.
        How do I serve them directly to MapLibre GL JS?
    assert:
      - type: llm-rubric
        value: >
          Answers the question about hosting PMTiles on Cloudflare R2
          and serving directly to MapLibre GL JS. Must not recommend
          Martin as the solution or bring up Martin configuration
          gotchas as relevant to this serverless PMTiles question.


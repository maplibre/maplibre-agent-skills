# Evals for the maplibre-tile-sources skill.
#
# Skill content is injected as the system prompt via lib/skill-prompt.mjs.
#
# Tests selected by baseline methodology: each question was run without the
# skill (compare YAML) and confirmed to fail before being added here. Tests
# that pass without skill injection have no discriminating power and are excluded.
#
# Run locally (Cerebras — CI default; free, 14,400 RPD):
#   CEREBRAS_API_KEY=... npx promptfoo@latest eval \
#     --config evals/prompts/maplibre-tile-sources.yaml --no-cache -j 1
#
# For a stronger judge, add: --grader google:gemini-2.5-flash-lite
#
# IMPORTANT: Do NOT use --providers CLI flag — it bypasses skill-prompt.mjs
# and the skill will not be injected. Provider must be set in this YAML.

description: Evals for the maplibre-tile-sources skill

prompts:
  - file://lib/skill-prompt.mjs

providers:
  - id: cerebras:qwen-3-235b-a22b-instruct-2507
    label: cerebras-qwen

evaluateOptions:
  delay: 500

defaultTest:
  vars:
    skillFile: skills/maplibre-tile-sources/SKILL.md
  options:
    provider: cerebras:qwen-3-235b-a22b-instruct-2507

tests:
  - description: explicit — TileJSON endpoint as source
    vars:
      prompt: >
        My tile server exposes a TileJSON endpoint at /tiles.json.
        How do I use that in a MapLibre source config?
    assert:
      - type: llm-rubric
        value: >
          Shows a MapLibre source config using the `url` field pointing to
          the TileJSON endpoint rather than a `tiles` array.
          Explains that MapLibre reads the tile URL template, zoom range,
          and source-layer metadata from the TileJSON automatically.

  - description: implicit — custom style fails against hosted tiles
    vars:
      prompt: >
        I'm using a hosted tile provider's style URL and everything looks
        great. But when I try to write my own custom style against the same
        tile source, none of my layers show up.
    assert:
      - type: llm-rubric
        value: >
          Explains that the custom style's layer definitions must reference
          `source-layer` names exactly as they appear in the tile source's
          schema. Directs the developer to the TileJSON `vector_layers` field
          as the authoritative list of available source-layers. Explains
          that the provider's pre-built style already has these matched.

  - description: anti-pattern — addLayer covering basemap labels
    vars:
      prompt: >
        I added my GeoJSON data layer with map.addLayer() and it shows up,
        but it's drawn on top of all the street names and labels.
        How do I fix the layer order?
    assert:
      - type: icontains
        value: symbol
      - type: llm-rubric
        value: >
          Explains that `map.addLayer()` without a second argument appends
          the layer above everything including labels. Shows how to pass the
          ID of the first symbol layer as the second argument to
          `map.addLayer()` to insert the layer below labels. Includes or
          describes finding the first symbol layer ID.

  - description: negative — out-of-scope question (popup on click)
    vars:
      prompt: How do I show a popup when a user clicks on a map feature?
    assert:
      - type: llm-rubric
        value: >
          Answers the popup/click question correctly without recommending
          a specific tile provider or discussing tile source setup as if
          it were relevant to this question.

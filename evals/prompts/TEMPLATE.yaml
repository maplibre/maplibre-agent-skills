# Eval template for a new skill.
#
# Rename this file to match your skill directory name:
#   evals/prompts/maplibre-your-skill-name.yaml
#
# Write these prompts BEFORE writing the skill content.
# Open a draft PR with this file and the rubric for reviewer sign-off,
# then write the skill to make these tests pass.
#
# Run locally (Cerebras — set CEREBRAS_API_KEY):
#   npx promptfoo@latest eval \
#     --config evals/prompts/maplibre-your-skill-name.yaml \
#     --no-cache -j 1
#
# IMPORTANT: Never use --providers on the CLI — it bypasses lib/skill-prompt.js
# and the skill will not be injected into the system prompt.
# Provider must be configured in this file.

description: Evals for the maplibre-your-skill-name skill

prompts:
  - file://lib/skill-prompt.js

providers:
  # Cerebras — recommended; free tier (14,400 RPD / 64K TPM); used in CI
  # Sign up at inference.cerebras.ai, set CEREBRAS_API_KEY
  - id: cerebras:qwen-3-235b-a22b-instruct-2507
    label: cerebras-qwen
  # Google Gemini Flash-Lite — alternative; better model quality; 1,000 RPD free tier
  # Sign up at aistudio.google.com, set GOOGLE_API_KEY
  # Use --grader cerebras:llama-3.3-70b to avoid consuming Gemini quota for judging
  # - id: google:gemini-2.5-flash-lite
  #   label: gemini-flash
  # Ollama — local, no API key; smoke testing only (small models are unreliable judges)
  # - id: ollama:chat:llama3.2
  #   label: ollama-llama3.2

evaluateOptions:
  delay: 500 # ms between requests; increase to 10000 for Gemini free tier (10 RPM)

defaultTest:
  vars:
    skillFile: skills/maplibre-your-skill-name/SKILL.md
  options:
    provider: cerebras:qwen-3-235b-a22b-instruct-2507

# Write exactly 4 tests per skill — one of each type:
#   1. Explicit   — names the topic directly
#   2. Implicit   — describes the scenario without naming the solution
#   3. Anti-pattern — a wrong approach the skill should correct
#   4. Negative   — an unrelated question the skill should not dominate
#
# Assertions:
#   - type: llm-rubric   — qualitative check by the judge model; use for every test
#   - type: icontains    — deterministic substring check; use ONLY when there is a single
#                          unambiguous required term (e.g. an API name, a specific flag).
#                          Omit if the rubric already covers the requirement.
#
# Rubric: write rubric assertions inline in the llm-rubric value fields below.
# Keep each item specific and checkable — not "gives good advice".

tests:
  - description: explicit — [topic directly named]
    vars:
      prompt: '[Direct question about this skill topic]'
    assert:
      # icontains is optional — only add if there is one required unambiguous term
      # - type: icontains
      #   value: '[required API name or term]'
      - type: llm-rubric
        value: >
          [Describe what a correct response must include.
          Be specific and checkable — not "gives good advice".]

  - description: implicit — [scenario described without naming solution]
    vars:
      prompt: '[Developer describes a problem this skill solves]'
    assert:
      - type: llm-rubric
        value: >
          [Describe what a correct response must include.]

  - description: anti-pattern — [wrong approach developer might try]
    vars:
      prompt: '[Developer is doing something the skill warns against]'
    assert:
      - type: llm-rubric
        value: >
          [Describe what a correct response must say or not say.
          Be specific — include the correct approach and what to avoid.]

  - description: negative — out-of-scope question
    vars:
      prompt: '[An adjacent MapLibre question this skill should not dominate]'
    assert:
      - type: llm-rubric
        value: >
          Answers the question correctly without bringing up
          [your skill's topic] as if it were relevant to this question.
